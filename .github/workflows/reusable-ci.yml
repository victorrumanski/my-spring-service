# -------------------------------------------------------------------------------------------------
# REUSABLE CI/CD TEMPLATE (The "Master" Workflow)
# -------------------------------------------------------------------------------------------------
# This workflow acts like a "function" in programming. 
# Other microservices "call" this file to run their CI/CD logic without duplicating code.
# -------------------------------------------------------------------------------------------------

name: Reusable Java CI

on:
  # 'workflow_call' allows this workflow to be called by other workflows in other repositories.
  workflow_call:
    # 'inputs' are like parameters for a function.
    inputs:
      image_name:
        required: true
        type: string
        description: "The name of the Docker image to build (e.g., victorrumanski/my-spring-service)"

jobs:
  # --- JOB 1: BUILD AND TEST ---
  # This runs first to ensure the code is valid before we try to build an image.
  maven-build:
    runs-on: ubuntu-latest
    steps:
    # 1. Checkout the source code from the CALLING repository.
    - uses: actions/checkout@v4
    
    # 2. Setup Java and Maven cache.
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    # 3. Build the JAR file.
    - name: Build with Maven
      run: mvn -B package --file pom.xml

  # --- JOB 2: DOCKER RELEASE ---
  # This runs only after maven-build finishes successfully.
  docker-release:
    runs-on: ubuntu-latest
    needs: maven-build
    
    # We must explicitly grant write permissions to the GHCR package registry.
    permissions:
      contents: read
      packages: write
      
    steps:
    # 1. Checkout the code again to have access to the Dockerfile.
    - uses: actions/checkout@v4
    
    # 2. Login to GitHub Container Registry.
    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 3. Use the 'image_name' input we received from the caller to tag the image.
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        # Use the input parameter here!
        images: ghcr.io/${{ inputs.image_name }}
        tags: |
          type=sha
          latest

    # 4. Final step: Build the image and push it to the cloud.
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
